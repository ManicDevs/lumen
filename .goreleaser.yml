version: 2

project_name: lumen

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: lumen
    binary: lumen
    main: ./cmd/lumen
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X gitlab.torproject.org/cerberus-droid/lumen/internal/version.Version={{.Version}}
      - -X gitlab.torproject.org/cerberus-droid/lumen/internal/version.Commit={{.ShortCommit}}
      - -X gitlab.torproject.org/cerberus-droid/lumen/internal/version.Date={{.Date}}
    flags:
      - -trimpath
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "^style:"
      - "^refactor:"
      - "^perf:"
      - "^build:"

release:
  github:
    owner: ManicDevs
    name: lumen
  draft: false
  prerelease: auto
  name_template: "{{ .ProjectName }} v{{ .Version }}"

docker:
  - image_templates:
      - "ghcr.io/manicdevs/lumen:{{ .Version }}-amd64"
      - "ghcr.io/manicdevs/lumen:latest-amd64"
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
    goos: linux
    goarch: amd64
  - image_templates:
      - "ghcr.io/manicdevs/lumen:{{ .Version }}-arm64"
      - "ghcr.io/manicdevs/lumen:latest-arm64"
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
    goos: linux
    goarch: arm64

docker_manifests:
  - name_template: "ghcr.io/manicdevs/lumen:{{ .Version }}"
    image_templates:
      - "ghcr.io/manicdevs/lumen:{{ .Version }}-amd64"
      - "ghcr.io/manicdevs/lumen:{{ .Version }}-arm64"
  - name_template: "ghcr.io/manicdevs/lumen:latest"
    image_templates:
      - "ghcr.io/manicdevs/lumen:latest-amd64"
      - "ghcr.io/manicdevs/lumen:latest-arm64"
