version: "2"

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - gitlab.torproject.org/cerberus-droid/lumen

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - staticcheck
    - unused
    - asciicheck
    - misspell
    - unconvert
    - whitespace
  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow
    staticcheck:
      checks:
        - all
        - "-SA1012"
        - "-ST1000"
        - "-ST1005"
        - "-QF1003"
        - "-QF1012"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-dirs:
    - bin
    - build
