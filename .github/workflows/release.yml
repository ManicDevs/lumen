name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.25"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run tests
        run: go test -count=1 ./...
      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-s -w -X gitlab.torproject.org/cerberus-droid/lumen/internal/version.Version=$VERSION -X gitlab.torproject.org/cerberus-droid/lumen/internal/version.Commit=$COMMIT -X gitlab.torproject.org/cerberus-droid/lumen/internal/version.Date=$DATE"
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="$LDFLAGS" -o dist/lumen-linux-amd64 ./cmd/lumen/
          GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="$LDFLAGS" -o dist/lumen-linux-arm64 ./cmd/lumen/
          GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags="$LDFLAGS" -o dist/lumen-darwin-amd64 ./cmd/lumen/
          GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags="$LDFLAGS" -o dist/lumen-darwin-arm64 ./cmd/lumen/
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="$LDFLAGS" -o dist/lumen-windows-amd64.exe ./cmd/lumen/
      - name: Create checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/lumen-linux-amd64
            dist/lumen-linux-arm64
            dist/lumen-darwin-amd64
            dist/lumen-darwin-arm64
            dist/lumen-windows-amd64.exe
            dist/checksums.txt
