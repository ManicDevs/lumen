name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run `make build`
        2. Run `./bin/lumen --help`
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened.
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux (amd64)
        - Linux (arm64)
        - macOS (Intel)
        - macOS (Apple Silicon)
        - Windows
    validations:
      required: true

  - type: input
    id: go-version
    attributes:
      label: Go version
      description: "Output of `go version`"
      placeholder: "go1.25.1"
    validations:
      required: true

  - type: input
    id: ollama-version
    attributes:
      label: Ollama version
      description: "Output of `ollama --version`"
      placeholder: "0.9.5"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant log output. This will be automatically formatted as code.
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context about the problem.
